[web_joy.handle_event_action_1]
en = "Tell me a joke about dogs or robot dogs."

[web_joy.handle_event_action_2]
en = '''
Describe what you see in the image.
If there is a person in the image, write about them in more detail.
Try to figure out which actor or actress they resemble most.
'''

[web_voice.test_init_1]
en = '''
Say a short wise message.
Be funny and cute.
'''

[keresd.main_loop_1]
en = '''
This is a ball-finding game.
You are viewing this image through your own camera,
which is looking straight ahead.
Make a short description of what you can see in the image!
Focus on nearby objects, ignore those in the distance!

If a ball is physically present and verifiable
in the image, you must include it in your description.
If that specific object is missing or absent from the
image pixels, you are strictly forbidden from naming,
mentioning, or referencing it in any capacity.
'''

[keresd.main_loop_2]
en = '''
Analyze the following environmental description to
determine if the object is physically present or
explicitly missing:

Description: {description}

Task: Is a ball physically located and present in
the environment according to this text? 

Rules:
- If the text explicitly states a ball is NOT present, missing, or not visible, answer NO.
- If the text describes a ball being there, its location, or its appearance, answer YES.

Output exactly one word from the choices below with no punctuation.
Valid choices: YES, NO
'''

[keresd.main_loop_3]
en = '''
You are viewing this image through your own camera,
which is looking straight ahead.

Describe where you see the ball in the image,
and what the ball looks like!
'''

[keresd.main_loop_4]
en = '''
You are viewing this image through your own camera,
looking straight ahead at the immediate floor area
directly in front of your paws.

Task: Is the path directly in front of you blocked by
an immediate hazard, obstacle, drop-off, or table edge?

Answer with exactly one word from the valid options
below. Do not include punctuation, periods, or
formatting.

Valid Options:
YES
NO
'''
