<!DOCTYPE html>
<html>
<head>
    <title>Robotkutya</title>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <div class="header">
        <div class="tabs">
            <div class="tab tab1" onclick="clickPage(0)">{{ page0_name }}</div>
            <div class="tab tab2" onclick="clickPage(1)">{{ page1_name }}</div>
            <div class="tab tab3" onclick="clickPage(2)">{{ page2_name }}</div>
            <div class="tab tab4" onclick="clickPage(3)">{{ page3_name }}</div>
            <div class="tab tab5" onclick="clickPage(4)">{{ page4_name }}</div>
            <div class="tab tab6" onclick="clickPage(5)">{{ page5_name }}</div>
            <button id="voiceToggle" class="tab tab-voice" type="button" title="Enable voice" aria-label="Enable voice">
                &#128266;
            </button>
        </div>
        <h1 class="title">Robotkutya v26.6a</h1>
    </div>
    
    <div class="content-wrapper">
        <div id="iframeContainer" class="iframe-container">
            <iframe id="myIframe" scrolling="no"></iframe>
        </div>

        <div class="logos-container">
            <div class="logos">
                <img src="{{ url_for('static', filename='images/bme_logo_nagy_bordo.jpg') }}" alt="BME logo">
            </div>
            <div class="logos">
                <img src="{{ url_for('static', filename='images/Ericsson_logo.png') }}" alt="Ericsson logo">
            </div>
            <div class="logos">
                <img src="{{ url_for('static', filename='images/tmit75_logo.png') }}" alt="TMIT75_logo">
            </div>
            <div class="logos">
                <img src="{{ url_for('static', filename='images/hsn_logo.png') }}" alt="HSN_logo">
            </div>
        </div>
    </div>

    <div class="statusbar">
        <span class="statusbar-label">Status:</span>
        <span id="status" class="status-value status-unknown">...</span>
    </div>

    <script>
        var audioContext;
        var socket = io();

        function clickPage(page) {
            socket.emit('page_change', page);
        }

        function setVoiceEnabled(enabled) {
            var voiceBtn = document.getElementById('voiceToggle');
            if (!voiceBtn) {
                return;
            }

            if (enabled) {
                voiceBtn.classList.add('active');
            } else {
                voiceBtn.classList.remove('active');
            }
        }

        function enableVoice() {
            if (audioContext && audioContext.state !== 'running') {
                audioContext.resume().then(function() {
                    console.log('Playback resumed successfully');
                });
            }

            fetch('/voice/init', {
                method: 'GET'
            });

            setVoiceEnabled(true);
        }

        window.onload = function() {
            audioContext = new AudioContext();

            var voiceBtn = document.getElementById('voiceToggle');
            if (voiceBtn) {
                voiceBtn.addEventListener('click', enableVoice);
            }
        };
 
        socket.on('page_load', function(url) {
            document.getElementById('myIframe').src = url;
        });

        socket.on('connect', function() {
            console.log('Connected to server');
        });

        socket.on('audio_play', function(data) {
            console.log('Received request:', data);
            var audio = new Audio('/voice/' + encodeURIComponent(data));
            audio.play();
        });

        function updateStatus() {
            fetch('/api/status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var el = document.getElementById('status');
                    el.innerHTML = data.statusHTML;
                })
                .catch(function() {
                    var el = document.getElementById('status');
                    el.textContent = 'ERROR';
                });
        }

        updateStatus();
        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
