<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Web Prompt</title>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/prompt.css') }}">
</head>
<body>

<div class="container">
    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Prompt Input -->
        <div class="input-section">
            <label for="prompt-input">Prompt:</label>
            <div class="prompt-row">
                <textarea id="prompt-input" placeholder="Enter your prompt here..."></textarea>
                <button id="prompt-send" class="prompt-button prompt" disabled>Prompt</button>
            </div>
        </div>

        <!-- Reasoning Response -->
        <div class="response-section">
            <label>Response:</label>
            <textarea id="response-output" readonly placeholder="Response will appear here..."></textarea>
        </div>

        <!-- Tools Response -->
        <div class="tools-response-section">
            <label>Tools response:</label>
            <div class="tools-response-content">
                <textarea id="tools-response-output" readonly placeholder="Tools response will appear here..."></textarea>
                <div class="image-container">
                    <img id="tools-response-image" src="" alt="Tools response Image">
                </div>
            </div>
        </div>
    </div>

    <!-- Tool List -->
    <div class="tools-list-section">
        <label>Tools:</label>
        <ul id="tools-list">
            <!-- Tool list items will appear here -->
        </ul>
    </div>
</div>

<script>
    var socket = io();
    
    socket.on('ui_update_tools_response', function(data) {
        console.log('tools_response event', data.data);
        var text = document.getElementById('tools-response-output');
        if (text && data && typeof data.data !== 'undefined') {
            text.value += '\n';
            text.value += data.data;
        }
    });

    socket.on('ui_update_response', function(data) {
        console.log('response event', data.data);
        var text = document.getElementById('response-output');
        if (text && data && typeof data.data !== 'undefined') {
            text.value += '\n';
            text.value += data.data;
        }
    });

    socket.on('ui_update_tools', function(data) {
        console.log('tools event', data.data);
        var list = document.getElementById('tools-list');
        // clear existing items
        while (list.firstChild) list.removeChild(list.firstChild);
        if (!data.data) return;
        // data is expected to be a list/array of strings (tool names)
        try {
            data.data.forEach(function(name) {
                var li = document.createElement('li');
                li.textContent = String(name);
                list.appendChild(li);
            });
        } catch (e) {
            console.error('failed to render tools list', e);
        }
    });

    // Helpers to manage the prompt/abort button states
    function setToPrompt() {
        var sendBtn = document.getElementById('prompt-send');
        var promptInput = document.getElementById('prompt-input');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Prompt';
        sendBtn.classList.remove('abort');
        sendBtn.classList.add('prompt');
        sendBtn.onclick = function () {
            var text = promptInput.value || '';
            socket.emit('prompt', { prompt: text });
        };
    }

    function setToAbort() {
        var sendBtn = document.getElementById('prompt-send');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Abort';
        sendBtn.classList.remove('prompt');
        sendBtn.classList.add('abort');
        sendBtn.onclick = function () {
            socket.emit('abort_prompt');
        };
    }

    // Socket events to control button state from server
    socket.on('ui_update_prompt', function(data) {
        if (data.data == 'prompt') {
            setToPrompt();
        }
        else if (data.data == 'abort') {
            setToAbort();
        }
    });

</script>

</body>
</html>
