<!DOCTYPE html>
<html>
<head>
    <title>Web System</title>
    <script src="{{ url_for('static', filename='js/joy.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/system.css') }}">
</head>
<body>

<div class="container">
    <div class="video-container">
        <img src="/video/mjpeg" alt="MJPEG Video" />
    </div>

    <div class="joystick-column">
        <div id="joy1Div" class="joy-pad"></div>
        <div id="joy2Div" class="joy-pad"></div>
    </div>
    <div class="button-column">
        <button id="button_on" class="circle-button button-neutral">On</button>
        <button id="button_off" class="circle-button button-neutral">Off</button>
        <button id="button_reset" class="circle-button button-neutral">Reset</button>
        <button id="button_reload" class="circle-button button-neutral">Reload</button>
        <button id="button_pee" class="circle-button button-action">Pee</button>
        <button id="button_wave" class="circle-button button-action">Wave</button>
        <button id="button_look" class="circle-button button-action">Look</button>
        <button id="button_sit" class="circle-button button-action">Sit</button>
        <button id="button_joke" class="circle-button button-warn">Joke</button>
        <button id="button_what" class="circle-button button-warn">What</button>
    </div>
</div>

<script>
    var socket = io({
        path: '/apps/system/socket.io/'
    });
    socket.on('connect', function() {
        socket.emit('my event', {data: 'I\'m connected!'});
    });

    var Joy1 = new JoyStick('joy1Div', {}, function(stickData) {
        // Send the stickData as a JSON string
        socket.emit('joy1', stickData.cardinalDirection);
    });
    var Joy2 = new JoyStick('joy2Div', {}, function(stickData) {
        // Send the stickData as a JSON string
        socket.emit('joy2', stickData.cardinalDirection);
    });

    document.querySelector('#button_reset').addEventListener('click', function() {
        socket.emit('action', 'reset');
    });
    document.querySelector('#button_reload').addEventListener('click', function() {
        socket.emit('action', 'reload');
    });
    document.querySelector('#button_pee').addEventListener('click', function() {
        socket.emit('action', 'pee');
    });
    document.querySelector('#button_wave').addEventListener('click', function() {
        socket.emit('action', 'wave');
    });
    document.querySelector('#button_look').addEventListener('click', function() {
        socket.emit('action', 'look');
    });
    document.querySelector('#button_sit').addEventListener('click', function() {
        socket.emit('action', 'sit');
    });
    document.querySelector('#button_joke').addEventListener('click', function() {
        socket.emit('action', 'joke');
    });
    document.querySelector('#button_on').addEventListener('click', function() {
        socket.emit('action', 'on');
    });
    document.querySelector('#button_off').addEventListener('click', function() {
        socket.emit('action', 'off');
    });
    document.querySelector('#button_what').addEventListener('click', function() {
        // Fetch the current JPEG frame from the video source
        fetch('/video/jpeg')
            .then(response => response.blob())
            .then(blob => {
            const reader = new FileReader();
            reader.onloadend = function() {
                const dataURL = reader.result;
                socket.emit('image', dataURL);
                setTimeout(function() {
                    socket.emit('action', 'what');
                }, 500);
            };
            reader.readAsDataURL(blob);
            });
    });

</script>

</body>
</html>
