services:
  onboard:
    build: .
    container_name: onboard
    devices:
      - "/dev/video4:/dev/video4"
      - "/dev/serial0:/dev/serial0"
    network_mode: host        
    environment:
      - SERIAL_PORT=/dev/serial0
    volumes:
      - ./src/streamer.cfg:/root/streamer.cfg:ro
    expose:
      - "8001"

  onboard-mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: onboard-mcp
    environment:
      - MCP_SSH_PASSWORD=${MCP_SSH_PASSWORD}
      - MCP_KEY=${MCP_KEY}
      - DOGZILLA_API_BASE=http://onboard:8001
    ports:
      - "5000:5000"
      #- "2222:22"
    volumes:
      - ./mcp/data:/data
    restart: unless-stopped
