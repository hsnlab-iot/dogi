services:
  onboard:
    build: .
    #image: onboard:dev
    container_name: onboard
    devices:
      - "/dev/video4:/dev/video4"
      - "/dev/serial0:/dev/serial0"
    network_mode: host        
    volumes:
      - ./src/streamer.cfg:/root/streamer.cfg:ro
    environment:
      #- VIDEO_DST=10.6.6.20
      - VIDEO_DST=10.100.0.20
      - VIDEO_PORT=5100
