[server]
host = "0.0.0.0"
port = 8000

[camera]
device = "/dev/video0"
width = 640
height = 480
fps = 30
format = "yuyv422"

[stream]
default_address = "127.0.0.1"
default_port = 5000
codec = "h264_v4l2m2m"
bitrate = "1M"
use_hardware = true
mtu = 1400
payload_type = 96
qstream_max_buffers = 2
qsnap_max_buffers = 1
q_leaky = 2

[snapshot]
format = "jpeg"
quality = 80
timeout_seconds = 2.0
width = 640
height = 480
